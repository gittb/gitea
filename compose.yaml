# preuser-eval: compose-PULL bring-up for Gitea. Pulls the published image and pre-locks install
# (INSTALL_LOCK=true) with self-registration enabled + SQLite, so an AI user can register and use it
# from fresh state (no setup wizard, no seeded creds). Ephemeral per run.
services:
  server:
    image: gitea/gitea:1.22
    environment:
      GITEA__security__INSTALL_LOCK: "true"
      GITEA__service__DISABLE_REGISTRATION: "false"
      GITEA__service__REQUIRE_SIGNIN_VIEW: "false"
      GITEA__service__REGISTER_EMAIL_CONFIRM: "false"
      GITEA__database__DB_TYPE: "sqlite3"
      GITEA__server__HTTP_PORT: "3000"
      GITEA__server__ROOT_URL: "http://localhost:3000/"
    ports:
      - "3000:3000"
